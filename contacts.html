<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Контакты — BannerCheck</title>
  <meta name="description" content="Контактная информация сервиса мониторинга рекламы BannerCheck.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">BannerCheck</a>
      <button class="nav-toggle" aria-label="Меню" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav">
        <a href="index.html">Главная</a>
        <a href="about.html">О сервисе</a>
        <a href="contacts.html" class="active">Контакты</a>
        <a href="https://www.bannercheck.ru:8443/ords/f?p=102" class="btn-login">Вход</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-header">
      <div class="container">
        <h1>Контакты</h1>
      </div>
    </section>

    <section class="contact-info">
      <div class="container">
        <div class="contact-cards">
          <div class="contact-card">
            <h3>Электронная почта</h3>
            <p>По всем вопросам пишите на</p>
            <a href="mailto:info@bannercheck.ru">info@bannercheck.ru</a>
          </div>
          <div class="contact-card">
            <h3>Личный кабинет</h3>
            <p>Вход для зарегистрированных пользователей</p>
            <a href="https://www.bannercheck.ru:8443/ords/f?p=102" class="btn btn-primary">Войти в систему</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>E-mail: <a href="mailto:info@bannercheck.ru">info@bannercheck.ru</a></p>
    </div>
  </footer>

  <script>
    document.querySelector('.nav-toggle').addEventListener('click', function () {
      var nav = document.querySelector('.main-nav');
      var expanded = this.getAttribute('aria-expanded') === 'true';
      this.setAttribute('aria-expanded', !expanded);
      nav.classList.toggle('open');
    });
  </script>
</body>
</html>
